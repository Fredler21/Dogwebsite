name: backup-verify
on:
  schedule:
    - cron: '0 13 * * *'  # 09:00 ET — verifies the 02:30 ET backup
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Check most recent export exists
        env:
          BACKUP_BUCKET: ${{ secrets.BACKUP_BUCKET }}
        run: |
          set -euo pipefail
          gcloud storage ls "$BACKUP_BUCKET" --recursive | head -50
          # Fail if no export written in the last 30 hours
          latest=$(gcloud storage ls "$BACKUP_BUCKET" --recursive | tail -1 || true)
          [[ -n "$latest" ]] || { echo "No backup found"; exit 1; }
